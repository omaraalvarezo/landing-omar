<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#F5F5F5" stroke-width="1" opacity="0.04"/>
    </pattern>
    <radialGradient id="glow" cx="20%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#E8FF4F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8FF4F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mono label -->
  <text
    x="80"
    y="92"
    font-family="ui-monospace, 'Geist Mono', monospace"
    font-size="16"
    fill="#F5F5F5"
    fill-opacity="0.55"
    letter-spacing="2"
  >DISPONIBLE · CÚCUTA, CO</text>

  <!-- Headline -->
  <text
    x="80"
    y="240"
    font-family="-apple-system, 'Geist', system-ui, sans-serif"
    font-size="84"
    font-weight="500"
    fill="#F5F5F5"
    letter-spacing="-3"
  >ia aplicada a la</text>
  <text
    x="80"
    y="340"
    font-family="-apple-system, 'Geist', system-ui, sans-serif"
    font-size="84"
    font-weight="500"
    fill="#F5F5F5"
    letter-spacing="-3"
  >operación real de <tspan font-family="'Instrument Serif', Georgia, serif" font-style="italic" fill="#E8FF4F">pymes</tspan>.</text>

  <!-- Sub -->
  <text
    x="80"
    y="430"
    font-family="-apple-system, 'Geist', system-ui, sans-serif"
    font-size="22"
    fill="#F5F5F5"
    fill-opacity="0.55"
  >consultor de IA · operador de Enzo Motorsport + Arkhē Coworking</text>

  <!-- Bottom line -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#F5F5F5" stroke-opacity="0.08" stroke-width="0.5"/>

  <!-- Bottom: name -->
  <text
    x="80"
    y="585"
    font-family="-apple-system, 'Geist', system-ui, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#F5F5F5"
  >omar álvarez</text>

  <!-- Bottom: url -->
  <text
    x="1120"
    y="585"
    text-anchor="end"
    font-family="ui-monospace, 'Geist Mono', monospace"
    font-size="14"
    fill="#E8FF4F"
    letter-spacing="1.5"
  >OMARALVAREZ.CO</text>
</svg>
