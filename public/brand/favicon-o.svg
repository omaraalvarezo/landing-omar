<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="o. — Omar Álvarez">
  <title>Omar Álvarez favicon</title>
  <desc>Favicon: lowercase "o." in Geist Mono Medium with the dot in signal blue.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&display=swap');
    .wm { font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-weight: 500; font-size: 44px; letter-spacing: -0.025em; }
    .ink { fill: #0A0A0A; }
    .accent { fill: #1E5FA8; }
  </style>
  <rect width="64" height="64" fill="#FAFAF9"/>
  <text x="32" y="32" class="wm ink" text-anchor="middle" dominant-baseline="middle">
    <tspan>o</tspan><tspan class="accent">.</tspan>
  </text>
</svg>
